spring:
  application:
    name: jwt-gft
  datasource:
    url: jdbc:h2:mem:bookstoredb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

server:
  port: 8080
  error:
    include-message: always

application:
  security:
    jwt:
      secret-key: TWFudWFsTW9kNV9Nb2Q2X0pXVF9TZWNyZXRfSFMyNTZfMzJfYnl0ZXM=
      expiration: 900000
      refresh-token:
        expiration: 604800000

app:
  jwt:
    secret: TWFudWFsTW9kNV9Nb2Q2X0pXVF9TZWNyZXRfSFMyNTZfMzJfYnl0ZXM=
    expiration-ms: 900000
  security:
    require-https: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
